name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16' 

      - name: Install dependencies
        run: |
          npm install

      - name: Build the app
        run: |
          npm run build

      - name: Set Git user info for deployment
        run: |
          git config --global user.name "yogeshwaran"
          git config --global user.email "itsyogeshwaran@gmail.com"

      - name: Deploy to GitHub Pages
        run: |
          npm run deploy
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
